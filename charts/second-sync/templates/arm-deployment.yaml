apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm
  template:
    metadata:
      labels:
        app: arm
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      initContainers:
      - name: arm-permissions
        image: alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Fixing ARM config permissions..."
            mkdir -p /home/arm /etc/arm/config
            chown -R 1000:1000 /home/arm /etc/arm/config
        volumeMounts:
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
      containers:

      - name: arm
        image: {{ .Values.images.arm }}
        securityContext:
          privileged: true
        env:
        - name: ARM_UID
          value: "1000"
        - name: ARM_GID
          value: "1000"
        volumeMounts:
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
        - name: media
          mountPath: /home/arm/media
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
          readOnly: true
      
      - name: arm-listener
        image: {{ .Values.images.arm }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting ARM Insertion Listener..."
            while true; do
              if [ -b /dev/sr0 ]; then
                # Check if disc is present using blkid
                if blkid /dev/sr0 > /dev/null 2>&1; then
                  # Check if ARM main.py is already running in the Pod
                  if ! ps aux | grep -v grep | grep -q "main.py"; then
                    echo "Disc detected! Triggering ARM..."
                    # We run the ripper as the arm user
                    su - arm -c "python3 /opt/arm/arm/ripper/main.py -d sr0"
                  fi
                fi
              fi
              sleep 10
            done
        securityContext:
          privileged: true
        volumeMounts:
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
        - name: media
          mountPath: /home/arm/media

      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-arm
        persistentVolumeClaim:
          claimName: arm-config-pvc
      - name: dev
        hostPath:
          path: /dev
      - name: sys
        hostPath:
          path: /sys
