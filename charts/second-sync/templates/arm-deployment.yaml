apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm
  template:
    metadata:
      labels:
        app: arm
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      shareProcessNamespace: true
      initContainers:
      - name: arm-permissions
        image: alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Fixing ARM config permissions..."
            mkdir -p /home/arm /etc/arm/config /home/arm/.MakeMKV
            chown -R 1000:1000 /home/arm /etc/arm/config /home/arm/.MakeMKV
            
            # Enable MakeMKV auto-download of keys
            FILE="/home/arm/.MakeMKV/settings.conf"
            if [ ! -f "$FILE" ]; then
              echo 'app_EnableAutoKey="1"' > "$FILE"
              chown 1000:1000 "$FILE"
            elif ! grep -q "app_EnableAutoKey" "$FILE"; then
              echo 'app_EnableAutoKey="1"' >> "$FILE"
            fi

            # Permanent patch for main.py (AttributeError fix)
            # This is a hack to patch the RO filesystem if needed, but since it's /opt/arm
            # we check if we can write to it or if we need a shared mount.
            # Actually ARM image has /opt/arm as part of the image. 
            # We can't easily patch it from initContainer unless we use a volume for /opt/arm
            # Let's try to do it in the container start instead.
        volumeMounts:
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
      containers:
      - name: arm
        image: {{ .Values.images.arm }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Apply permanent patch for main.py
            sed -i 's/job_length.seconds/getattr(job_length, "seconds", 0)/g' /opt/arm/arm/ripper/main.py
            sed -i 's/job_length.days/getattr(job_length, "days", 0)/g' /opt/arm/arm/ripper/main.py
            # Start the original entrypoint
            exec /sbin/my_init
        securityContext:
          privileged: true
        env:
        - name: ARM_UID
          value: "1000"
        - name: ARM_GID
          value: "1000"
        - name: DISABLE_LOGIN
          value: "true"
        volumeMounts:

        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
        - name: media
          mountPath: /home/arm/media
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
          readOnly: true
      
      - name: arm-listener
        image: {{ .Values.images.arm }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting ARM Insertion Listener..."
            # Fix git safe directory issue
            git config --global --add safe.directory /opt/arm
            LAST_DISC=""
            while true; do
              if [ -b /dev/sr0 ]; then
                # Check for disc presence using blkid
                # We try to get the volume ID or label
                DISC_ID=$(blkid -o value -s UUID /dev/sr0 || blkid -o value -s LABEL /dev/sr0 || echo "")
                
                if [ ! -z "$DISC_ID" ]; then
                  if [ "$DISC_ID" != "$LAST_DISC" ]; then
                    echo "New disc detected (ID: $DISC_ID)! Triggering ARM..."
                    LAST_DISC="$DISC_ID"
                    # Trigger ARM
                    su - arm -c "git config --global --add safe.directory /opt/arm && python3 /opt/arm/arm/ripper/main.py -d sr0" &
                  fi
                else
                  # No disc or blkid failed
                  if [ "$LAST_DISC" != "" ]; then
                    # Double check with a low-level tool if possible
                    # but for now we'll assume it's removed if blkid fails
                    echo "Disc removed."
                    LAST_DISC=""
                  fi
                fi
              fi
              sleep 10
            done
        securityContext:
          privileged: true
        env:
        - name: ARM_UID
          value: "1000"
        - name: ARM_GID
          value: "1000"
        volumeMounts:
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
        - name: media
          mountPath: /home/arm/media

      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-arm
        persistentVolumeClaim:
          claimName: arm-config-pvc
      - name: dev
        hostPath:
          path: /dev
      - name: sys
        hostPath:
          path: /sys
