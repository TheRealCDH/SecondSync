apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm
  template:
    metadata:
      labels:
        app: arm
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      shareProcessNamespace: true
      initContainers:
      - name: arm-permissions
        image: alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Fixing ARM config permissions..."
            mkdir -p /home/arm /etc/arm/config /home/arm/.MakeMKV
            chown -R 1000:1000 /home/arm /etc/arm/config /home/arm/.MakeMKV
        volumeMounts:
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
      containers:
      - name: arm
        image: {{ .Values.images.arm }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Apply permanent patch for main.py
            sed -i 's/job_length.seconds/getattr(job_length, "seconds", 0)/g' /opt/arm/arm/ripper/main.py
            sed -i 's/job_length.days/getattr(job_length, "days", 0)/g' /opt/arm/arm/ripper/main.py
            
            # Patch update_key.sh to use FlareSolverr sidecar
            cat <<'EOF' > /opt/arm/scripts/update_key.sh
            #!/bin/bash
            set -e
            MAKEMKV_DIR="/home/arm/.MakeMKV"
            mkdir -p "$MAKEMKV_DIR"
            SETTINGS_FILE="$MAKEMKV_DIR/settings.conf"
            
            echo "Requesting key via FlareSolverr..."
            # Get the page via FlareSolverr API
            RESPONSE=$(curl -s -X POST http://localhost:8191/v1 -H "Content-Type: application/json" -d '{"cmd": "request.get", "url": "https://forum.makemkv.com/forum/viewtopic.php?f=5&t=1053"}')
            
            # Extract key from HTML in JSON response
            MAKEMKV_SERIAL=$(echo "$RESPONSE" | grep -oP 'T-[\w\d@]{66}' | head -n 1)
            
            if [ -z "$MAKEMKV_SERIAL" ]; then
                echo "Failed to find key in FlareSolverr response."
                exit 40
            fi
            
            echo "Found key: $MAKEMKV_SERIAL"
            if grep -q "app_Key" "$SETTINGS_FILE"; then
                sed -i "s|app_Key = \".*\"|app_Key = \"$MAKEMKV_SERIAL\"|" "$SETTINGS_FILE"
            else
                echo "app_Key = \"$MAKEMKV_SERIAL\"" >> "$SETTINGS_FILE"
            fi
            echo 'app_EnableAutoKey="1"' >> "$SETTINGS_FILE" 2>/dev/null || true
            sort -u -o "$SETTINGS_FILE" "$SETTINGS_FILE"
            chown arm:arm "$SETTINGS_FILE"
            EOF
            chmod +x /opt/arm/scripts/update_key.sh

            # Start ARM
            exec /sbin/my_init
        securityContext:
          privileged: true
        env:
        - name: ARM_UID
          value: "1000"
        - name: ARM_GID
          value: "1000"
        - name: DISABLE_LOGIN
          value: "true"
        volumeMounts:
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
        - name: media
          mountPath: /home/arm/media
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
          readOnly: true

      - name: arm-listener
        image: {{ .Values.images.arm }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting ARM Insertion Listener..."
            # Fix git safe directory issue
            git config --global --add safe.directory /opt/arm
            # Apply same main.py patches as the arm container
            sed -i 's/job_length\.seconds/getattr(job_length, "seconds", 0)/g' /opt/arm/arm/ripper/main.py
            sed -i 's/job_length\.days/getattr(job_length, "days", 0)/g' /opt/arm/arm/ripper/main.py
            LAST_DISC=""
            rm -f /tmp/arm-ripping
            while true; do
              if [ -b /dev/sr0 ]; then
                # Check for disc presence using blkid
                DISC_ID=$(blkid -o value -s UUID /dev/sr0 || blkid -o value -s LABEL /dev/sr0 || echo "")
                if [ ! -z "$DISC_ID" ]; then
                    if [ "$DISC_ID" != "$LAST_DISC" ]; then
                        # Check lockfile instead of pgrep (pgrep -f matched shell script's own cmdline)
                        if [ -f /tmp/arm-ripping ]; then
                            echo "Disc detected but ARM is already running. Skipping trigger."
                        else
                            echo "New disc detected (ID: $DISC_ID)! Triggering ARM..."
                            LAST_DISC="$DISC_ID"
                            touch /tmp/arm-ripping
                            su - arm -c "python3 /opt/arm/arm/ripper/main.py -d sr0"
                            rm -f /tmp/arm-ripping
                            echo "ARM job finished. Waiting for drive to settle..."
                            sleep 30
                        fi
                    fi
                elif [ "$LAST_DISC" != "" ]; then
                    # Verify removal - only clear when no rip is running
                    if [ ! -f /tmp/arm-ripping ]; then
                        echo "Disc removed."
                        LAST_DISC=""
                    fi
                fi
              fi
              sleep 10
            done
        securityContext:
          privileged: true
        env:
        - name: ARM_UID
          value: "1000"
        - name: ARM_GID
          value: "1000"
        volumeMounts:
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
        - name: media
          mountPath: /home/arm/media

      - name: flaresolverr
        image: {{ .Values.images.flaresolverr }}
        env:
        - name: LOG_LEVEL
          value: info
        - name: TZ
          value: UTC

      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-arm
        persistentVolumeClaim:
          claimName: arm-config-pvc
      - name: dev
        hostPath:
          path: /dev
      - name: sys
        hostPath:
          path: /sys
