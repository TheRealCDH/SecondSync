apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm
  template:
    metadata:
      labels:
        app: arm
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      containers:
      - name: arm
        image: {{ .Values.images.arm }}
        securityContext:
          privileged: true
        env:
        - name: ARM_UID
          value: "1000"
        - name: ARM_GID
          value: "1000"
        volumeMounts:
        - name: config-arm
          mountPath: /home/arm
          subPath: home
        - name: config-arm
          mountPath: /etc/arm/config
          subPath: config
        - name: media
          mountPath: /home/arm/media
        - name: dev-sr0
          mountPath: /dev/sr0
        - name: dev-sg5
          mountPath: /dev/sg5
      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-arm
        persistentVolumeClaim:
          claimName: arm-config-pvc
      - name: dev-sr0
        hostPath:
          path: /dev/sr0
      - name: dev-sg5
        hostPath:
          path: /dev/sg5
