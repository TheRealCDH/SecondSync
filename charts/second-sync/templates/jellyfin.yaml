apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      runtimeClassName: nvidia
      initContainers:
      - name: wait-for-nvidia
        image: nvidia/cuda:12.6.3-base-ubuntu24.04
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "Waiting for nvidia-device-plugin to be ready..."
            for i in $(seq 1 60); do
              if nvidia-smi > /dev/null 2>&1; then
                echo "GPU ready after ${i}s"
                exit 0
              fi
              sleep 1
            done
            echo "GPU not ready after 60s" >&2
            exit 1
      - name: jellyfin-patch
        image: alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            FILE="/config/config/encoding.xml"
            if [ -f "$FILE" ]; then
              echo "Patching Jellyfin hardware acceleration..."
              sed -i "s|<HardwareAccelerationType>.*</HardwareAccelerationType>|<HardwareAccelerationType>nvenc</HardwareAccelerationType>|" "$FILE"
              sed -i "s|<EnableTonemapping>.*</EnableTonemapping>|<EnableTonemapping>true</EnableTonemapping>|" "$FILE"
              sed -i "s|<EnableVppTonemapping>.*</EnableVppTonemapping>|<EnableVppTonemapping>true</EnableVppTonemapping>|" "$FILE"
              sed -i "s|<AllowHevcEncoding>.*</AllowHevcEncoding>|<AllowHevcEncoding>true</AllowHevcEncoding>|" "$FILE"
              sed -i "s|<EnableEnhancedNvdecDecoder>.*</EnableEnhancedNvdecDecoder>|<EnableEnhancedNvdecDecoder>true</EnableEnhancedNvdecDecoder>|" "$FILE"
              # Add Hardware Scaling if missing, then set to true
              if ! grep -q "EnableHardwareScaling" "$FILE"; then
                sed -i "/<\/EncodingOptions>/i \  <EnableHardwareScaling>true</EnableHardwareScaling>" "$FILE"
              else
                sed -i "s|<EnableHardwareScaling>.*</EnableHardwareScaling>|<EnableHardwareScaling>true</EnableHardwareScaling>|" "$FILE"
              fi
            fi
        volumeMounts:
        - name: config-jellyfin
          mountPath: /config
      containers:
      - name: jellyfin
        image: {{ .Values.images.jellyfin }}
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "all"
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: config-jellyfin
          mountPath: /config
        - name: jellyfin-cache
          mountPath: /cache
        - name: media
          mountPath: /media
          readOnly: true
      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-jellyfin
        persistentVolumeClaim:
          claimName: jellyfin-config-pvc
      - name: jellyfin-cache
        emptyDir: {}
