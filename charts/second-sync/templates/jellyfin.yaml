apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      runtimeClassName: nvidia
      initContainers:
      - name: jellyfin-patch
        image: alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            FILE="/config/config/encoding.xml"
            if [ -f "$FILE" ]; then
              echo "Patching Jellyfin hardware acceleration..."
              # Use a simple python script via apk
              apk add --no-cache python3
              python3 -c '
import xml.etree.ElementTree as ET
import os

path = "'$FILE'"
tree = ET.parse(path)
root = tree.getroot()

options = {
    "HardwareAccelerationType": "nvenc",
    "EnableTonemapping": "true",
    "EnableVppTonemapping": "true",
    "AllowHevcEncoding": "true",
    "EnableHardwareScaling": "true",
    "EnableEnhancedNvdecDecoder": "true",
    "PreferSystemNativeHwDecoder": "true",
    "EnableHardwareEncoding": "true"
}

for tag, val in options.items():
    node = root.find(tag)
    if node is None:
        node = ET.SubElement(root, tag)
    node.text = val

# Handle HardwareDecodingCodecs
hwd = root.find("HardwareDecodingCodecs")
if hwd is not None:
    root.remove(hwd)
hwd = ET.SubElement(root, "HardwareDecodingCodecs")
codecs = ["h264", "hevc", "mpeg2video", "mpeg4", "vc1", "vp8", "vp9", "av1"]
for c in codecs:
    s = ET.SubElement(hwd, "string")
    s.text = c

tree.write(path, encoding="utf-16", xml_declaration=True)
'
            fi
        volumeMounts:
        - name: config-jellyfin
          mountPath: /config
      containers:
      - name: jellyfin
        image: {{ .Values.images.jellyfin }}
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "all"
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: config-jellyfin
          mountPath: /config
        - name: jellyfin-cache
          mountPath: /cache
        - name: media
          mountPath: /media
          readOnly: true
      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-jellyfin
        persistentVolumeClaim:
          claimName: jellyfin-config-pvc
      - name: jellyfin-cache
        emptyDir: {}
