# Overseerr
apiVersion: v1
kind: Service
metadata:
  name: overseerr
spec:
  type: NodePort
  selector:
    app: arr-stack
  ports:
  - port: 5055
    targetPort: 5055
    nodePort: {{ .Values.ports.overseerr }}
---
# Sonarr
apiVersion: v1
kind: Service
metadata:
  name: sonarr
spec:
  type: NodePort
  selector:
    app: arr-stack
  ports:
  - port: 8989
    targetPort: 8989
    nodePort: {{ .Values.ports.sonarr }}
---
# Radarr
apiVersion: v1
kind: Service
metadata:
  name: radarr
spec:
  type: NodePort
  selector:
    app: arr-stack
  ports:
  - port: 7878
    targetPort: 7878
    nodePort: {{ .Values.ports.radarr }}
---
# Transmission Web
apiVersion: v1
kind: Service
metadata:
  name: transmission
spec:
  type: NodePort
  selector:
    app: arr-stack
  ports:
  - name: web
    port: 9091
    targetPort: 9091
    nodePort: {{ .Values.ports.transmission }}
  - name: peer
    port: 51413
    targetPort: 51413
    nodePort: {{ .Values.ports.transmissionPeer }}
---
