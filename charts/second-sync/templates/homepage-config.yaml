apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: flux-system
data:
  settings.yaml: |
    title: SecondSync Dashboard
    layout:
      Management:
        style: cols-3
      Media:
        style: cols-3
      Download:
        style: cols-2
  
  widgets.yaml: |
    - logo:
        icon: https://raw.githubusercontent.com/TheRealCDH/SecondSync/main/logo.png
    - resources:
        cpu: true
        memory: true
    - datetime:
        format:
          dateStyle: long
          timeStyle: short

  services.yaml: |
    - Management:
        - Jellyseerr:
            icon: jellyseerr.png
            href: http://{{ .Values.tailscaleIP }}:30001
            description: Request Management
            widget:
              type: jellyseerr
              url: http://127.0.0.1:5055
              key: {{ "{{" }}HOMEPAGE_VAR_API_KEY{{ "}}" }}
        - Prowlarr:
            icon: prowlarr.png
            href: http://{{ .Values.tailscaleIP }}:30005
            description: Indexer Management
            widget:
              type: prowlarr
              url: http://127.0.0.1:9696
              key: {{ "{{" }}HOMEPAGE_VAR_API_KEY{{ "}}" }}

    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: http://{{ .Values.tailscaleIP }}:30007
            description: Media Server
            widget:
              type: jellyfin
              url: http://jellyfin:8096
              key: 2727b02a3f414e0b95b9401cbaaa5c02
        - Sonarr:
            icon: sonarr.png
            href: http://{{ .Values.tailscaleIP }}:30002
            description: TV Series
            widget:
              type: sonarr
              url: http://127.0.0.1:8989
              key: {{ "{{" }}HOMEPAGE_VAR_API_KEY{{ "}}" }}
        - Radarr:
            icon: radarr.png
            href: http://{{ .Values.tailscaleIP }}:30003
            description: Movies
            widget:
              type: radarr
              url: http://127.0.0.1:7878
              key: {{ "{{" }}HOMEPAGE_VAR_API_KEY{{ "}}" }}
        - Bazarr:
            icon: bazarr.png
            href: http://{{ .Values.tailscaleIP }}:30006
            description: Subtitles
            widget:
              type: bazarr
              url: http://127.0.0.1:6767
              key: {{ "{{" }}HOMEPAGE_VAR_API_KEY{{ "}}" }}

    - Download:
        - Transmission:
            icon: transmission.png
            href: http://{{ .Values.tailscaleIP }}:30004
            description: Torrent Client
            widget:
              type: transmission
              url: http://127.0.0.1:9091
              username: {{ "{{" }}HOMEPAGE_VAR_TR_USER{{ "}}" }}
              password: {{ "{{" }}HOMEPAGE_VAR_TR_PASS{{ "}}" }}
        - ARM:
            icon: https://raw.githubusercontent.com/automatic-ripping-machine/automatic-ripping-machine/main/arm/static/img/arm-logo.png
            href: http://{{ .Values.tailscaleIP }}:30008
            description: Automatic Ripping Machine

  bookmarks.yaml: |
    - GitHub:
        - SecondSync Repo:
            - icon: github.png
              href: https://github.com/TheRealCDH/SecondSync
