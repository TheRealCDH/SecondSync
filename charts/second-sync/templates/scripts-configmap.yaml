apiVersion: v1
kind: ConfigMap
metadata:
  name: arr-scripts
data:
  proxy.py: |
    import http.server, socketserver, requests, json, time
    FLARESOLVERR_URL = "http://127.0.0.1:8191/v1"
    PORT = 8118
    class FlareProxy(http.server.BaseHTTPRequestHandler):
        def do_GET(self): self.handle_request("get")
        def do_POST(self): self.handle_request("post")
        def handle_request(self, method):
            payload = {"cmd": f"request.{method}", "url": self.path, "maxTimeout": 60000}
            try:
                resp = requests.post(FLARESOLVERR_URL, json=payload, timeout=70)
                data = resp.json()
                if data.get("status") == "ok":
                    self.send_response(200)
                    self.send_header("Content-Type", "text/html")
                    self.end_headers()
                    self.wfile.write(data.get("solution", {}).get("response", "").encode())
                else:
                    self.send_error(502, f"FlareSolverr Error: {data.get('message')}")
            except Exception as e: self.send_error(500, str(e))
    
    print(f"Starting FlareSolverr Proxy on port {PORT}...")
    while True:
        try:
            with socketserver.TCPServer(("", PORT), FlareProxy) as httpd:
                httpd.allow_reuse_address = True
                httpd.serve_forever()
        except Exception as e:
            print(f"Proxy crashed: {e}. Restarting in 5s...")
            time.sleep(5)

  linker.sh: |
    #!/bin/sh
    # Wait for VPN and Internet
    echo "Waiting for internet connectivity..."
    until ping -c 1 google.com > /dev/null 2>&1; do sleep 2; done
    
    # Install dependencies
    echo "Installing tools..."
    apk add --no-cache curl jq
    python3 -m pip install requests
    
    API_KEY=$(cat /run/shared/api_key)
    PASSWORD=${TR_PASS:-admin}
    USER=${TR_USER:-admin}

    # Start FlareSolverr Proxy
    python3 /run/scripts/proxy.py > /tmp/proxy.log 2>&1 &
    
    # Wait for services
    echo "Waiting for stack to wake up..."
    until curl -s "http://127.0.0.1:9696/api/v1/system/status?apikey=$API_KEY" | grep -q "version"; do sleep 5; done
    until curl -s "http://127.0.0.1:7878/api/v3/system/status?apikey=$API_KEY" | grep -q "version"; do sleep 5; done
    until curl -s "http://127.0.0.1:8989/api/v3/system/status?apikey=$API_KEY" | grep -q "version"; do sleep 5; done
    until curl -s "http://127.0.0.1:5055/api/v1/status" | grep -q "version"; do sleep 5; done

    echo "All services up. Linking..."

    # 1. Prowlarr -> Radarr/Sonarr
    for APP in "Radarr:7878:RadarrSettings" "Sonarr:8989:SonarrSettings"; do
      NAME=$(echo $APP | cut -d: -f1)
      PORT=$(echo $APP | cut -d: -f2)
      CONTRACT=$(echo $APP | cut -d: -f3)
      
      echo "Ensuring $NAME is linked in Prowlarr..."
      EXISTING=$(curl -s "http://127.0.0.1:9696/api/v1/applications?apikey=$API_KEY" | jq -c ".[] | select(.name == \"$NAME\")")
      if [ ! -z "$EXISTING" ]; then
        ID=$(echo $EXISTING | jq -r .id)
        echo "Updating existing $NAME (ID: $ID)..."
        UPDATED=$(echo $EXISTING | jq -c ".syncLevel = \"fullSync\" | .fields = [{\"name\": \"baseUrl\", \"value\": \"http://127.0.0.1:$PORT\"}, {\"name\": \"apiKey\", \"value\": \"$API_KEY\"}]")
        curl -s -X PUT "http://127.0.0.1:9696/api/v1/applications/$ID?apikey=$API_KEY" -H "Content-Type: application/json" -d "$UPDATED" > /dev/null
      else
        echo "Adding new $NAME..."
        curl -s -X POST "http://127.0.0.1:9696/api/v1/applications?apikey=$API_KEY" -H "Content-Type: application/json" \
          -d "{\"name\": \"$NAME\", \"enabled\": true, \"syncLevel\": \"fullSync\", \"configContract\": \"$CONTRACT\", \"implementation\": \"$NAME\", \"fields\": [{\"name\": \"baseUrl\", \"value\": \"http://127.0.0.1:$PORT\"}, {\"name\": \"apiKey\", \"value\": \"$API_KEY\"}]}" > /dev/null
      fi
    done

    # 2. Radarr/Sonarr -> Transmission
    for PORT in 7878 8989; do
      echo "Ensuring Transmission is linked in app on port $PORT..."
      EXISTING=$(curl -s "http://127.0.0.1:$PORT/api/v3/downloadclient?apikey=$API_KEY" | jq -c ".[] | select(.name == \"Transmission\")")
      if [ ! -z "$EXISTING" ]; then
        ID=$(echo $EXISTING | jq -r .id)
        echo "Updating Transmission in app on port $PORT..."
        UPDATED=$(echo $EXISTING | jq -c ".fields = [{\"name\": \"host\", \"value\": \"127.0.0.1\"}, {\"name\": \"port\", \"value\": 9091}, {\"name\": \"username\", \"value\": \"$USER\"}, {\"name\": \"password\", \"value\": \"$PASSWORD\"}]")
        curl -s -X PUT "http://127.0.0.1:$PORT/api/v3/downloadclient/$ID?apikey=$API_KEY" -H "Content-Type: application/json" -d "$UPDATED" > /dev/null
      else
        echo "Adding Transmission to app on port $PORT..."
        curl -s -X POST "http://127.0.0.1:$PORT/api/v3/downloadclient?apikey=$API_KEY" -H "Content-Type: application/json" \
          -d "{\"name\": \"Transmission\", \"enable\": true, \"priority\": 1, \"implementation\": \"Transmission\", \"configContract\": \"TransmissionSettings\", \"fields\": [{\"name\": \"host\", \"value\": \"127.0.0.1\"}, {\"name\": \"port\", \"value\": 9091}, {\"name\": \"username\", \"value\": \"$USER\"}, {\"name\": \"password\", \"value\": \"$PASSWORD\"}]}" > /dev/null
      fi
    done

    # 3. Add Root Folders
    if ! curl -s "http://127.0.0.1:7878/api/v3/rootfolder?apikey=$API_KEY" | jq -e ".[]" > /dev/null; then
      echo "Adding Radarr Root Folder..."
      curl -s -X POST "http://127.0.0.1:7878/api/v3/rootfolder?apikey=$API_KEY" -H "Content-Type: application/json" -d "{\"path\": \"/downloads/Movies\"}"
    fi
    if ! curl -s "http://127.0.0.1:8989/api/v3/rootfolder?apikey=$API_KEY" | jq -e ".[]" > /dev/null; then
      echo "Adding Sonarr Root Folder..."
      curl -s -X POST "http://127.0.0.1:8989/api/v3/rootfolder?apikey=$API_KEY" -H "Content-Type: application/json" -d "{\"path\": \"/downloads/TV Shows\"}"
    fi

    # 4. Prowlarr -> FlareSolverr
    EXISTING_FS=$(curl -s "http://127.0.0.1:9696/api/v1/indexerproxy?apikey=$API_KEY" | jq -c ".[] | select(.name == \"FlareSolverr\")")
    if [ ! -z "$EXISTING_FS" ]; then
      ID=$(echo $EXISTING_FS | jq -r .id)
      echo "Updating FlareSolverr proxy..."
      UPDATED=$(echo $EXISTING_FS | jq -c ".fields = [{\"name\": \"host\", \"value\": \"http://127.0.0.1:8191\"}, {\"name\": \"requestTimeout\", \"value\": 60}]")
      curl -s -X PUT "http://127.0.0.1:9696/api/v1/indexerproxy/$ID?apikey=$API_KEY" -H "Content-Type: application/json" -d "$UPDATED" > /dev/null
    else
      echo "Adding FlareSolverr API to Prowlarr..."
      curl -s -X POST "http://127.0.0.1:9696/api/v1/indexerproxy?apikey=$API_KEY" -H "Content-Type: application/json" \
        -d "{\"name\": \"FlareSolverr\", \"enabled\": true, \"implementation\": \"FlareSolverr\", \"configContract\": \"FlareSolverrSettings\", \"fields\": [{\"name\": \"host\", \"value\": \"http://127.0.0.1:8191\"}, {\"name\": \"requestTimeout\", \"value\": 60}]}" > /dev/null
    fi

    # 5. Global HTTP Proxy
    if ! curl -s "http://127.0.0.1:9696/api/v1/indexerproxy?apikey=$API_KEY" | jq -e ".[] | select(.name == \"FlareSolverr-Global\")" > /dev/null; then
      echo "Adding FlareSolverr-Global HTTP Proxy..."
      curl -s -X POST "http://127.0.0.1:9696/api/v1/indexerproxy?apikey=$API_KEY" -H "Content-Type: application/json" \
        -d "{\"name\": \"FlareSolverr-Global\", \"enabled\": true, \"implementation\": \"Http\", \"configContract\": \"HttpSettings\", \"fields\": [{\"name\": \"host\", \"value\": \"127.0.0.1\"}, {\"name\": \"port\", \"value\": 8118}]}"
    fi

    echo "Automation complete. Entering loop..."
    while true; do
      echo "--- Loop iteration $(date) ---"
      
      # 1. Patch Jellyseerr Configuration File
      FILE="/jellyseerr/settings.json"
      if [ -f "$FILE" ] && jq -e ".main" "$FILE" > /dev/null; then
        echo "Ensuring Jellyseerr settings are correct..."
        TMP=$(mktemp)
        # Force API key and enable all Jellyfin libraries
        jq --arg key "$API_KEY" --arg jkey "2727b02a3f414e0b95b9401cbaaa5c02" '
          .main.apiKey = $key |
          .jellyfin.ip = "jellyfin" |
          .jellyfin.hostname = "jellyfin" |
          .jellyfin.port = 8096 |
          .jellyfin.useSsl = false |
          .jellyfin.apiKey = $jkey |
          .jellyfin.name = "Main" |
          .jellyfin.serverId = "26da23e0782d488382b90388c48397bd" |
          (.jellyfin.libraries[] | select(.id != null) | .enabled) = true |
          .public.initialized = false
        ' "$FILE" > "$TMP" && mv "$TMP" "$FILE"
        
        # Link Radarr to Jellyseerr via API
        R_PROFILE_ID=$(curl -s "http://127.0.0.1:7878/api/v3/qualityprofile?apikey=$API_KEY" | jq -r ".[] | select(.name == \"Any\") | .id")
        if [ -z "$R_PROFILE_ID" ] || [ "$R_PROFILE_ID" == "null" ]; then R_PROFILE_ID=1; fi
        
        if ! curl -s -X GET "http://127.0.0.1:5055/api/v1/settings/radarr" -H "X-Api-Key: $API_KEY" | jq -e ".[]" > /dev/null; then
          echo "Linking Radarr to Jellyseerr..."
          curl -s -X POST "http://127.0.0.1:5055/api/v1/settings/radarr" -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
            -d "{\"name\": \"Radarr\", \"hostname\": \"127.0.0.1\", \"port\": 7878, \"apiKey\": \"$API_KEY\", \"useSsl\": false, \"baseUrl\": \"\", \"activeProfileId\": $R_PROFILE_ID, \"activeProfileName\": \"Any\", \"activeDirectory\": \"/downloads/Movies\", \"isDefault\": true, \"syncLevel\": 1, \"is4k\": false, \"minimumAvailability\": \"announced\"}"
        fi

        # Link Sonarr to Jellyseerr
        S_PROFILE_ID=$(curl -s "http://127.0.0.1:8989/api/v3/qualityprofile?apikey=$API_KEY" | jq -r ".[] | select(.name == \"Any\") | .id")
        if [ -z "$S_PROFILE_ID" ] || [ "$S_PROFILE_ID" == "null" ]; then S_PROFILE_ID=1; fi

        if ! curl -s -X GET "http://127.0.0.1:5055/api/v1/settings/sonarr" -H "X-Api-Key: $API_KEY" | jq -e ".[]" > /dev/null; then
          echo "Linking Sonarr to Jellyseerr..."
          curl -s -X POST "http://127.0.0.1:5055/api/v1/settings/sonarr" -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
            -d "{\"name\": \"Sonarr\", \"hostname\": \"127.0.0.1\", \"port\": 8989, \"apiKey\": \"$API_KEY\", \"useSsl\": false, \"baseUrl\": \"\", \"activeProfileId\": $S_PROFILE_ID, \"activeProfileName\": \"Any\", \"activeDirectory\": \"/downloads/TV Shows\", \"isDefault\": true, \"syncLevel\": 1, \"is4k\": false, \"enableSeasonFolders\": true}"
        fi
      fi

      # 2. Jellyfin Language Defaults
      J_TOKEN="2727b02a3f414e0b95b9401cbaaa5c02"
      USERS=$(curl -s -H "X-Emby-Token: $J_TOKEN" http://jellyfin:8096/Users)
      if [ ! -z "$USERS" ] && echo "$USERS" | grep -q "Id"; then
        for USER_ID in $(echo "$USERS" | jq -r '.[].Id'); do
          CURRENT_CONF=$(curl -s -H "X-Emby-Token: $J_TOKEN" "http://jellyfin:8096/Users/$USER_ID/Configuration")
          if [ ! -z "$CURRENT_CONF" ] && [ "$CURRENT_CONF" != "null" ]; then
            if [ "$(echo "$CURRENT_CONF" | jq -r '.AudioLanguagePreference')" != "eng" ] || [ "$(echo "$CURRENT_CONF" | jq -r '.SubtitleLanguagePreference')" != "eng" ] || [ "$(echo "$CURRENT_CONF" | jq -r '.SubtitleMode')" != "NoSubtitles" ]; then
              echo "Setting English/NoSubtitles defaults for Jellyfin user $USER_ID..."
              UPDATED_CONF=$(echo "$CURRENT_CONF" | jq '.AudioLanguagePreference = "eng" | .SubtitleLanguagePreference = "eng" | .SubtitleMode = "NoSubtitles"')
              curl -s -X POST -H "X-Emby-Token: $J_TOKEN" -H "Content-Type: application/json" \
                "http://jellyfin:8096/Users/$USER_ID/Configuration" -d "$UPDATED_CONF" > /dev/null
            fi
          fi
        done
      fi

      # 3. ARM Config Patching
      ARM_CONF="/arm-config/arm.yaml"
      if [ -f "$ARM_CONF" ]; then
        if ! grep -q "SKIP_TRANSCODE: true" "$ARM_CONF"; then
          echo "Patching ARM configuration for direct rips and no login..."
          sed -i 's|RAW_PATH:.*|RAW_PATH: "/home/arm/media/.arm/raw/"|' "$ARM_CONF"
          sed -i 's|TRANSCODE_PATH:.*|TRANSCODE_PATH: "/home/arm/media/.arm/transcode/"|' "$ARM_CONF"
          sed -i 's|COMPLETED_PATH:.*|COMPLETED_PATH: "/home/arm/media/Movies/"|' "$ARM_CONF"
          sed -i 's|DISABLE_LOGIN:.*|DISABLE_LOGIN: true|' "$ARM_CONF"
          sed -i 's|SKIP_TRANSCODE:.*|SKIP_TRANSCODE: true|' "$ARM_CONF"
          sed -i 's|RIPMETHOD:.*|RIPMETHOD: "mkv"|' "$ARM_CONF"
          sed -i 's|METADATA_PROVIDER:.*|METADATA_PROVIDER: "none"|' "$ARM_CONF"
          mkdir -p /home/arm/media/.arm/raw /home/arm/media/.arm/transcode
          chown -R 1000:1000 /home/arm/media/.arm
        fi
      fi

      # 4. Auto-tag Indexers for FlareSolverr
      TAG_ID=$(curl -s "http://127.0.0.1:9696/api/v1/tag?apikey=$API_KEY" | jq -r ".[] | select(.label == \"flaresolverr\") | .id")
      if [ -z "$TAG_ID" ] || [ "$TAG_ID" == "null" ]; then
        TAG_ID=$(curl -s -X POST "http://127.0.0.1:9696/api/v1/tag?apikey=$API_KEY" -H "Content-Type: application/json" -d "{\"label\": \"flaresolverr\"}" | jq -r ".id")
      fi
      if [ ! -z "$TAG_ID" ] && [ "$TAG_ID" != "null" ]; then
        PROXY=$(curl -s "http://127.0.0.1:9696/api/v1/indexerproxy?apikey=$API_KEY" | jq -c ".[] | select(.name == \"FlareSolverr\")")
        PROXY_ID=$(echo "$PROXY" | jq -r ".id")
        if [ ! -z "$PROXY_ID" ] && [ "$PROXY_ID" != "null" ]; then
            if ! echo "$PROXY" | jq -e ".tags | contains([$TAG_ID])" > /dev/null; then
              echo "Applying flaresolverr tag to FlareSolverr proxy..."
              curl -s -X PUT "http://127.0.0.1:9696/api/v1/indexerproxy/$PROXY_ID?apikey=$API_KEY" -H "Content-Type: application/json" -d "$(echo "$PROXY" | jq -c ".tags = (.tags + [$TAG_ID] | unique)")" > /dev/null
            fi
        fi
        INDEXERS=$(curl -s "http://127.0.0.1:9696/api/v1/indexer?apikey=$API_KEY")
        if [ ! -z "$INDEXERS" ] && [ "$INDEXERS" != "[]" ]; then
            for ID in $(echo "$INDEXERS" | jq -r ".[] | .id"); do
              INDEXER=$(echo "$INDEXERS" | jq -c ".[] | select(.id == $ID)")
              if ! echo "$INDEXER" | jq -e ".tags | contains([$TAG_ID])" > /dev/null; then
                echo "Applying flaresolverr tag to indexer $ID..."
                curl -s -X PUT "http://127.0.0.1:9696/api/v1/indexer/$ID?apikey=$API_KEY" -H "Content-Type: application/json" -d "$(echo "$INDEXER" | jq -c ".tags = (.tags + [$TAG_ID] | unique)")" > /dev/null
              fi
            done
        fi
      fi
      
      # 5. Trigger a sync in Prowlarr
      curl -s -X POST "http://127.0.0.1:9696/api/v1/command?apikey=$API_KEY" -H "Content-Type: application/json" -d '{"name": "ApplicationIndexerSync"}' > /dev/null

      sleep 300
    done
