apiVersion: v1
kind: ConfigMap
metadata:
  name: arr-scripts
data:
  proxy.py: |
    import http.server, socketserver, requests, json, time
    FLARESOLVERR_URL = "http://localhost:8191/v1"
    PORT = 8118
    class FlareProxy(http.server.BaseHTTPRequestHandler):
        def do_GET(self): self.handle_request("get")
        def do_POST(self): self.handle_request("post")
        def handle_request(self, method):
            payload = {"cmd": f"request.{method}", "url": self.path, "maxTimeout": 60000}
            try:
                resp = requests.post(FLARESOLVERR_URL, json=payload, timeout=70)
                data = resp.json()
                if data.get("status") == "ok":
                    self.send_response(200)
                    self.send_header("Content-Type", "text/html")
                    self.end_headers()
                    self.wfile.write(data.get("solution", {}).get("response", "").encode())
                else:
                    self.send_error(502, f"FlareSolverr Error: {data.get('message')}")
            except Exception as e: self.send_error(500, str(e))
    
    print(f"Starting FlareSolverr Proxy on port {PORT}...")
    while True:
        try:
            with socketserver.TCPServer(("", PORT), FlareProxy) as httpd:
                httpd.allow_reuse_address = True
                httpd.serve_forever()
        except Exception as e:
            print(f"Proxy crashed: {e}. Restarting in 5s...")
            time.sleep(5)

  linker.sh: |
    #!/bin/sh
    # Wait for VPN and Internet
    echo "Waiting for internet connectivity..."
    until ping -c 1 google.com > /dev/null 2>&1; do sleep 2; done
    apk add --no-cache curl jq python3 py3-requests
    
    API_KEY=$(cat /run/shared/api_key)
    PASSWORD=$(cat /run/shared/password)

    # Start FlareSolverr Proxy
    python3 /run/scripts/proxy.py > /tmp/proxy.log 2>&1 &
    
    # Wait for services
    echo "Waiting for stack to wake up..."
    until curl -s "http://localhost:9696/api/v1/system/status?apikey=$API_KEY" | grep -q "version"; do sleep 5; done
    until curl -s "http://localhost:7878/api/v3/system/status?apikey=$API_KEY" | grep -q "version"; do sleep 5; done
    until curl -s "http://localhost:8989/api/v3/system/status?apikey=$API_KEY" | grep -q "version"; do sleep 5; done
    until curl -s "http://localhost:5055/api/v1/status" | grep -q "version"; do sleep 5; done

    echo "All services up. Linking..."

    # 1. Prowlarr -> Radarr/Sonarr
    if ! curl -s "http://localhost:9696/api/v1/applications?apikey=$API_KEY" | jq -e ".[] | select(.name == \"Radarr\")" > /dev/null; then
      echo "Adding Radarr to Prowlarr..."
      curl -s -X POST "http://localhost:9696/api/v1/applications?apikey=$API_KEY" -H "Content-Type: application/json" \
        -d "{\"name\": \"Radarr\", \"enabled\": true, \"configContract\": \"RadarrSettings\", \"implementation\": \"Radarr\", \"fields\": [{\"name\": \"baseUrl\", \"value\": \"http://localhost:7878\"}, {\"name\": \"apiKey\", \"value\": \"$API_KEY\"}, {\"name\": \"syncLevel\", \"value\": \"fullSync\"}]}"
    fi
    if ! curl -s "http://localhost:9696/api/v1/applications?apikey=$API_KEY" | jq -e ".[] | select(.name == \"Sonarr\")" > /dev/null; then
      echo "Adding Sonarr to Prowlarr..."
      curl -s -X POST "http://localhost:9696/api/v1/applications?apikey=$API_KEY" -H "Content-Type: application/json" \
        -d "{\"name\": \"Sonarr\", \"enabled\": true, \"configContract\": \"SonarrSettings\", \"implementation\": \"Sonarr\", \"fields\": [{\"name\": \"baseUrl\", \"value\": \"http://localhost:8989\"}, {\"name\": \"apiKey\", \"value\": \"$API_KEY\"}, {\"name\": \"syncLevel\", \"value\": \"fullSync\"}]}"
    fi

    # 2. Radarr/Sonarr -> Transmission
    for PORT in 7878 8989; do
      if ! curl -s "http://localhost:$PORT/api/v3/downloadclient?apikey=$API_KEY" | jq -e ".[] | select(.name == \"Transmission\")" > /dev/null; then
        curl -s -X POST "http://localhost:$PORT/api/v3/downloadclient?apikey=$API_KEY" -H "Content-Type: application/json" \
          -d "{\"name\": \"Transmission\", \"enable\": true, \"priority\": 1, \"implementation\": \"Transmission\", \"configContract\": \"TransmissionSettings\", \"fields\": [{\"name\": \"host\", \"value\": \"localhost\"}, {\"name\": \"port\", \"value\": 9091}, {\"name\": \"username\", \"value\": \"admin\"}, {\"name\": \"password\", \"value\": \"$PASSWORD\"}]}"
      fi
    done

    # 3. Add Root Folders
    if ! curl -s "http://localhost:7878/api/v3/rootfolder?apikey=$API_KEY" | jq -e ".[]" > /dev/null; then
      curl -s -X POST "http://localhost:7878/api/v3/rootfolder?apikey=$API_KEY" -H "Content-Type: application/json" -d "{\"path\": \"/downloads/Movies\"}"
    fi
    if ! curl -s "http://localhost:8989/api/v3/rootfolder?apikey=$API_KEY" | jq -e ".[]" > /dev/null; then
      curl -s -X POST "http://localhost:8989/api/v3/rootfolder?apikey=$API_KEY" -H "Content-Type: application/json" -d "{\"path\": \"/downloads/TV Shows\"}"
    fi

    # 4. Prowlarr -> FlareSolverr
    if ! curl -s "http://localhost:9696/api/v1/indexerproxy?apikey=$API_KEY" | jq -e ".[] | select(.name == \"FlareSolverr\")" > /dev/null; then
      curl -s -X POST "http://localhost:9696/api/v1/indexerproxy?apikey=$API_KEY" -H "Content-Type: application/json" \
        -d "{\"name\": \"FlareSolverr\", \"enabled\": true, \"implementation\": \"FlareSolverr\", \"configContract\": \"FlareSolverrSettings\", \"fields\": [{\"name\": \"host\", \"value\": \"http://localhost:8191\"}, {\"name\": \"requestTimeout\", \"value\": 60}]}"
    fi

    # 5. Global HTTP Proxy
    if ! curl -s "http://localhost:9696/api/v1/indexerproxy?apikey=$API_KEY" | jq -e ".[] | select(.name == \"FlareSolverr-Global\")" > /dev/null; then
      curl -s -X POST "http://localhost:9696/api/v1/indexerproxy?apikey=$API_KEY" -H "Content-Type: application/json" \
        -d "{\"name\": \"FlareSolverr-Global\", \"enabled\": true, \"implementation\": \"Http\", \"configContract\": \"HttpSettings\", \"fields\": [{\"name\": \"host\", \"value\": \"localhost\"}, {\"name\": \"port\", \"value\": 8118}]}"
    fi

    echo "Automation complete. Entering loop..."
    while true; do
      echo "--- Loop iteration $(date) ---"
      # 9. Jellyfin Language Defaults
      J_TOKEN="2727b02a3f414e0b95b9401cbaaa5c02"
      USERS=$(curl -s -H "X-Emby-Token: $J_TOKEN" http://jellyfin:8096/Users)
      if [ ! -z "$USERS" ] && echo "$USERS" | grep -q "Id"; then
        for USER_ID in $(echo "$USERS" | jq -r '.[].Id'); do
          CURRENT_CONF=$(curl -s -H "X-Emby-Token: $J_TOKEN" "http://jellyfin:8096/Users/$USER_ID/Configuration")
          if [ ! -z "$CURRENT_CONF" ] && [ "$CURRENT_CONF" != "null" ]; then
            if [ "$(echo "$CURRENT_CONF" | jq -r '.AudioLanguagePreference')" != "eng" ] || [ "$(echo "$CURRENT_CONF" | jq -r '.SubtitleLanguagePreference')" != "eng" ]; then
              echo "Setting English defaults for Jellyfin user $USER_ID..."
              UPDATED_CONF=$(echo "$CURRENT_CONF" | jq '.AudioLanguagePreference = "eng" | .SubtitleLanguagePreference = "eng" | .SubtitleMode = "Default"')
              curl -s -X POST -H "X-Emby-Token: $J_TOKEN" -H "Content-Type: application/json" \
                "http://jellyfin:8096/Users/$USER_ID/Configuration" -d "$UPDATED_CONF" > /dev/null
            fi
          fi
        done
      fi

      FILE="/jellyseerr/settings.json"
      if [ -f "$FILE" ] && jq -e ".main" "$FILE" > /dev/null; then
        if [ "$(jq -r '.main.apiKey' "$FILE")" != "$API_KEY" ]; then
          echo "Patching Jellyseerr API key in file..."
          TMP=$(mktemp); jq --arg key "$API_KEY" '.main.apiKey = $key' "$FILE" > "$TMP" && mv "$TMP" "$FILE"
        fi
        
        # Link Radarr to Jellyseerr
        if ! curl -s -X GET "http://localhost:5055/api/v1/settings/radarr" -H "X-Api-Key: $API_KEY" | jq -e ".[]" > /dev/null; then
          echo "Linking Radarr to Jellyseerr..."
          curl -s -X POST "http://localhost:5055/api/v1/settings/radarr" -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
            -d "{\"name\": \"Radarr\", \"hostname\": \"localhost\", \"port\": 7878, \"apiKey\": \"$API_KEY\", \"useSsl\": false, \"baseUrl\": \"\", \"activeProfileId\": 1, \"activeProfileName\": \"Any\", \"activeDirectory\": \"/downloads/Movies\", \"isDefault\": true, \"syncLevel\": 1, \"is4k\": false, \"minimumAvailability\": \"announced\"}"
        fi

        # Link Sonarr to Jellyseerr
        if ! curl -s -X GET "http://localhost:5055/api/v1/settings/sonarr" -H "X-Api-Key: $API_KEY" | jq -e ".[]" > /dev/null; then
          echo "Linking Sonarr to Jellyseerr..."
          curl -s -X POST "http://localhost:5055/api/v1/settings/sonarr" -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
            -d "{\"name\": \"Sonarr\", \"hostname\": \"localhost\", \"port\": 8989, \"apiKey\": \"$API_KEY\", \"useSsl\": false, \"baseUrl\": \"\", \"activeProfileId\": 1, \"activeProfileName\": \"Any\", \"activeDirectory\": \"/downloads/TV Shows\", \"isDefault\": true, \"syncLevel\": 1, \"is4k\": false, \"enableSeasonFolders\": true}"
        fi

        # Update Jellyfin connection
        JELLYFIN_CONF=$(curl -s -X GET "http://localhost:5055/api/v1/settings/jellyfin" -H "X-Api-Key: $API_KEY")
        if echo "$JELLYFIN_CONF" | grep -q "100.67.54.105"; then
           echo "Updating Jellyfin link in Jellyseerr..."
           curl -s -X POST "http://localhost:5055/api/v1/settings/jellyfin" -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
             -d "{\"ip\": \"jellyfin\", \"port\": 8096, \"apiKey\": \"$(echo "$JELLYFIN_CONF" | jq -r .apiKey)\", \"useSsl\": false}"
        fi
      fi

      TAG_ID=$(curl -s "http://localhost:9696/api/v1/tag?apikey=$API_KEY" | jq -r ".[] | select(.label == \"flaresolverr\") | .id")
      if [ -z "$TAG_ID" ] || [ "$TAG_ID" == "null" ]; then
        TAG_ID=$(curl -s -X POST "http://localhost:9696/api/v1/tag?apikey=$API_KEY" -H "Content-Type: application/json" -d "{\"label\": \"flaresolverr\"}" | jq -r ".id")
      fi
      if [ ! -z "$TAG_ID" ] && [ "$TAG_ID" != "null" ]; then
        PROXY=$(curl -s "http://localhost:9696/api/v1/indexerproxy?apikey=$API_KEY" | jq -c ".[] | select(.name == \"FlareSolverr\")")
        PROXY_ID=$(echo "$PROXY" | jq -r ".id")
        if ! echo "$PROXY" | jq -e ".tags | contains([$TAG_ID])" > /dev/null; then
          curl -s -X PUT "http://localhost:9696/api/v1/indexerproxy/$PROXY_ID?apikey=$API_KEY" -H "Content-Type: application/json" -d "$(echo "$PROXY" | jq -c ".tags = (.tags + [$TAG_ID] | unique)")" > /dev/null
        fi
        INDEXERS=$(curl -s "http://localhost:9696/api/v1/indexer?apikey=$API_KEY")
        for ID in $(echo "$INDEXERS" | jq -r ".[] | .id"); do
          INDEXER=$(echo "$INDEXERS" | jq -c ".[] | select(.id == $ID)")
          if ! echo "$INDEXER" | jq -e ".tags | contains([$TAG_ID])" > /dev/null; then
            curl -s -X PUT "http://localhost:9696/api/v1/indexer/$ID?apikey=$API_KEY" -H "Content-Type: application/json" -d "$(echo "$INDEXER" | jq -c ".tags = (.tags + [$TAG_ID] | unique)")" > /dev/null
          fi
        done
      fi
      sleep 60
    done
