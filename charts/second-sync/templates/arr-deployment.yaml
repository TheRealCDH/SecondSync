apiVersion: apps/v1
kind: Deployment
metadata:
  name: arr-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arr-stack
  template:
    metadata:
      labels:
        app: arr-stack
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: key-derivator
        image: alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Derive a 32-char hex string from the Wireguard key
            RAW_KEY=$(cat /etc/vpn/mull.key | tr -d '\n\r ')
            echo "$RAW_KEY" | sha256sum | cut -c1-32 > /run/shared/api_key
            echo "$RAW_KEY" | sha256sum | cut -c1-16 > /run/shared/password
        volumeMounts:
        - name: vpn-key
          mountPath: /etc/vpn/mull.key
          readOnly: true
        - name: shared-keys
          mountPath: /run/shared

      containers:
      # --- VPN GATEWAY ---
      - name: gluetun
        image: {{ .Values.images.gluetun }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            export WIREGUARD_PRIVATE_KEY=$(cat /etc/vpn/mull.key | tr -d '\n\r ')
            exec /gluetun-entrypoint
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
          runAsUser: 0
        env:
        - name: VPN_SERVICE_PROVIDER
          value: "custom"
        - name: VPN_TYPE
          value: "wireguard"
        - name: WIREGUARD_ENDPOINT_IP
          value: "77.243.184.130"
        - name: WIREGUARD_ENDPOINT_PORT
          value: "51820"
        - name: WIREGUARD_PUBLIC_KEY
          value: "5ioE7vTw80KVx0S/zYOZonR5ZkR+uiNJogR9Pyqtwzg="
        - name: WIREGUARD_ADDRESSES
          value: "10.68.25.24/32"
        - name: FIREWALL_OUTBOUND_SUBNETS
          value: {{ .Values.vpn.localSubnets | quote }}
        - name: FIREWALL_INPUT_PORTS
          value: "5055,8989,7878,9091,51413,9696,6767,8080"
        volumeMounts:
        - name: vpn-key
          mountPath: /etc/vpn/mull.key
          readOnly: true

      # --- ARR APPS ---
      - name: transmission
        image: {{ .Values.images.transmission }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            export USER={{ .Values.transmission.username }}
            export PASS={{ .Values.transmission.password }}
            exec /init
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "UTC"
        volumeMounts:
        - name: shared-keys
          mountPath: /run/shared
          readOnly: true
        - name: config-transmission
          mountPath: /config
        - name: media
          mountPath: /downloads

      - name: sonarr
        image: {{ .Values.images.sonarr }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            export SONARR__AUTH__APIKEY=$(cat /run/shared/api_key)
            export SONARR__AUTH__METHOD=External
            exec /init
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        volumeMounts:
        - name: shared-keys
          mountPath: /run/shared
          readOnly: true
        - name: config-sonarr
          mountPath: /config
        - name: media
          mountPath: /media
        - name: media
          mountPath: /downloads

      - name: radarr
        image: {{ .Values.images.radarr }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            export RADARR__AUTH__APIKEY=$(cat /run/shared/api_key)
            export RADARR__AUTH__METHOD=External
            exec /init
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        volumeMounts:
        - name: shared-keys
          mountPath: /run/shared
          readOnly: true
        - name: config-radarr
          mountPath: /config
        - name: media
          mountPath: /media
        - name: media
          mountPath: /downloads

      - name: prowlarr
        image: {{ .Values.images.prowlarr }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            export PROWLARR__AUTH__APIKEY=$(cat /run/shared/api_key)
            export PROWLARR__AUTH__METHOD=External
            export HTTP_PROXY=http://localhost:8118
            export NO_PROXY=localhost,127.0.0.1,10.0.0.0/8,100.64.0.0/10
            exec /init
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        volumeMounts:
        - name: shared-keys
          mountPath: /run/shared
          readOnly: true
        - name: config-prowlarr
          mountPath: /config

      - name: bazarr
        image: {{ .Values.images.bazarr }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            export BAZARR__AUTH__APIKEY=$(cat /run/shared/api_key)
            exec /init
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        volumeMounts:
        - name: shared-keys
          mountPath: /run/shared
          readOnly: true
        - name: config-bazarr
          mountPath: /config
        - name: media
          mountPath: /media
        - name: media
          mountPath: /downloads

      - name: overseerr
        image: {{ .Values.images.overseerr }}
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        volumeMounts:
        - name: config-overseerr
          mountPath: /app/config

      - name: flaresolverr
        image: {{ .Values.images.flaresolverr }}
        env:
        - name: LOG_LEVEL
          value: info
        - name: TZ
          value: UTC

      - name: homepage
        image: {{ .Values.images.homepage }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            mkdir -p /app/config
            cp /app/config-cm/*.yaml /app/config/
            export HOMEPAGE_VAR_API_KEY=$(cat /run/shared/api_key)
            export HOMEPAGE_VAR_TR_USER={{ .Values.transmission.username | quote }}
            export HOMEPAGE_VAR_TR_PASS={{ .Values.transmission.password | quote }}
            export HOMEPAGE_ALLOWED_HOSTS="{{ .Values.tailscaleIP }},{{ .Values.tailscaleIP }}:{{ .Values.ports.homepage }},ripnix,ripnix:{{ .Values.ports.homepage }},ripnix.tailscale.net,ripnix.tailscale.net:{{ .Values.ports.homepage }},localhost,127.0.0.1"
            exec /usr/local/bin/node server.js
        volumeMounts:
        - name: shared-keys
          mountPath: /run/shared
          readOnly: true
        - name: homepage-config
          mountPath: /app/config-cm
        - name: config-homepage
          mountPath: /app/config

      # --- AUTO-LINKER SIDE CAR ---
      - name: arr-linker
        image: python:3.11-alpine
        command: ["/bin/sh", "/run/scripts/linker.sh"]
        env:
        - name: TR_USER
          value: {{ .Values.transmission.username | quote }}
        - name: TR_PASS
          value: {{ .Values.transmission.password | quote }}
        volumeMounts:
        - name: shared-keys
          mountPath: /run/shared
          readOnly: true
        - name: arr-scripts
          mountPath: /run/scripts
        - name: config-overseerr
          mountPath: /jellyseerr
      volumes:

      - name: shared-keys
        emptyDir: {}
      - name: arr-scripts
        configMap:
          name: arr-scripts
      - name: vpn-key
        hostPath:
          path: /root/mull.key
          type: File
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-sonarr
        persistentVolumeClaim:
          claimName: sonarr-config-pvc
      - name: config-radarr
        persistentVolumeClaim:
          claimName: radarr-config-pvc
      - name: config-transmission
        persistentVolumeClaim:
          claimName: transmission-config-pvc
      - name: config-prowlarr
        persistentVolumeClaim:
          claimName: prowlarr-config-pvc
      - name: config-bazarr
        persistentVolumeClaim:
          claimName: bazarr-config-pvc
      - name: config-overseerr
        persistentVolumeClaim:
          claimName: overseerr-config-pvc
      - name: config-homepage
        persistentVolumeClaim:
          claimName: homepage-config-pvc
      - name: homepage-config
        configMap:
          name: homepage-config
