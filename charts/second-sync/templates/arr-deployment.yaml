apiVersion: apps/v1
kind: Deployment
metadata:
  name: arr-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arr-stack
  template:
    metadata:
      labels:
        app: arr-stack
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      containers:
      # --- VPN GATEWAY ---
      - name: gluetun
        image: {{ .Values.images.gluetun }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            export WIREGUARD_PRIVATE_KEY=$(cat /etc/vpn/mull.key | tr -d '\n\r ')
            exec /gluetun-entrypoint
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
          runAsUser: 0
        env:
        - name: VPN_SERVICE_PROVIDER
          value: "custom"
        - name: VPN_TYPE
          value: "wireguard"
        - name: WIREGUARD_ENDPOINT_IP
          value: "77.243.184.130"
        - name: WIREGUARD_ENDPOINT_PORT
          value: "51820"
        - name: WIREGUARD_PUBLIC_KEY
          value: "5ioE7vTw80KVx0S/zYOZonR5ZkR+uiNJogR9Pyqtwzg="
        - name: WIREGUARD_ADDRESSES
          value: "10.68.25.24/32"
        - name: FIREWALL_OUTBOUND_SUBNETS
          value: {{ .Values.vpn.localSubnets | quote }}
        - name: FIREWALL_INPUT_PORTS
          value: "5055,8989,7878,9091,51413,9696,6767"
        volumeMounts:
        - name: vpn-key
          mountPath: /etc/vpn/mull.key
          readOnly: true

      # --- ARR APPS ---
      - name: transmission
        image: {{ .Values.images.transmission }}
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "UTC"
        volumeMounts:
        - name: config-transmission
          mountPath: /config
        - name: media
          mountPath: /downloads

      - name: sonarr
        image: {{ .Values.images.sonarr }}
        volumeMounts:
        - name: config-sonarr
          mountPath: /config
        - name: media
          mountPath: /media
        - name: media
          mountPath: /downloads

      - name: radarr
        image: {{ .Values.images.radarr }}
        volumeMounts:
        - name: config-radarr
          mountPath: /config
        - name: media
          mountPath: /media
        - name: media
          mountPath: /downloads

      - name: prowlarr
        image: {{ .Values.images.prowlarr }}
        volumeMounts:
        - name: config-prowlarr
          mountPath: /config

      - name: bazarr
        image: {{ .Values.images.bazarr }}
        volumeMounts:
        - name: config-bazarr
          mountPath: /config
        - name: media
          mountPath: /media

      - name: overseerr
        image: {{ .Values.images.overseerr }}
        volumeMounts:
        - name: config-overseerr
          mountPath: /app/config

      volumes:
      - name: vpn-key
        hostPath:
          path: /root/mull.key
          type: File
      - name: media
        persistentVolumeClaim:
          claimName: second-sync-media-pvc
      - name: config-sonarr
        persistentVolumeClaim:
          claimName: sonarr-config-pvc
      - name: config-radarr
        persistentVolumeClaim:
          claimName: radarr-config-pvc
      - name: config-transmission
        persistentVolumeClaim:
          claimName: transmission-config-pvc
      - name: config-prowlarr
        persistentVolumeClaim:
          claimName: prowlarr-config-pvc
      - name: config-bazarr
        persistentVolumeClaim:
          claimName: bazarr-config-pvc
      - name: config-overseerr
        persistentVolumeClaim:
          claimName: overseerr-config-pvc
