# Global Settings
nodeName: ripnix
storageClass: local-path
mediaHostPath: /MASS/Plex
tailscaleIP: "100.67.54.105"

# VPN Settings (Mullvad)
vpn:
  # Tailscale and internal k3s subnets
  localSubnets: "100.64.0.0/10,10.42.0.0/16,10.43.0.0/16,192.168.2.0/24"

# NodePort Mapping
ports:
  overseerr: 30001
  sonarr: 30002
  radarr: 30003
  transmission: 30004
  prowlarr: 30005
  bazarr: 30006
  jellyfin: 30007
  arm: 30008
  transmissionPeer: 31413
  homepage: 30000

# Transmission Credentials
transmission:
  username: admin
  password: admin

# Image Tags
images:
  gluetun: qmcgaw/gluetun:latest
  transmission: linuxserver/transmission:latest
  sonarr: linuxserver/sonarr:latest
  radarr: linuxserver/radarr:latest
  prowlarr: linuxserver/prowlarr:latest
  bazarr: linuxserver/bazarr:latest
  overseerr: fallenbagel/jellyseerr:latest
  jellyfin: jellyfin/jellyfin:latest
  flaresolverr: ghcr.io/flaresolverr/flaresolverr:latest
  flaresolverrProxy: diegotreitos/flaresolverr-proxy:latest
  arm: automaticrippingmachine/automatic-ripping-machine:latest
  homepage: ghcr.io/gethomepage/homepage:latest
